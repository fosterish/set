server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    server_name _;

    # All assets are referenced relatively so the app can be hosted at
    # any path (e.g. behind a reverse-proxy at /set/). Just serve files.
    location / {
        try_files $uri $uri/ =404;
    }

    # Always revalidate via ETag/Last-Modified so users immediately get
    # new app code on next visit. Bytes still 304 when unchanged.
    location ~* \.(?:js|html|css|svg)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
